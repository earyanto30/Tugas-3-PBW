<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informasi Stok Bahan Ajar - Sistem Bahan Ajar UT</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="dashboard.html" class="brand" style="display: flex; align-items: center;">
            <img src="assets/images/logo.png" alt="UT Logo" style="height: 30px; margin-right: 10px;">
            Sistem Bahan Ajar UT
        </a>
        <ul class="nav-links">
            <li><a href="stok.html">Informasi Bahan Ajar</a></li>
            <li><a href="tracking.html">Tracking Pengiriman</a></li>
            <li class="dropdown">
                <a href="#">Laporan &#9662;</a>
                <div class="dropdown-content">
                    <a href="#">Monitoring progress DO</a>
                    <a href="#">Rekap bahan ajar</a>
                </div>
            </li>
            <li><a href="#">Histori Transaksi</a></li>
            <li><a href="index.html" onclick="localStorage.removeItem('loggedInUser')">Logout</a></li>
        </ul>
    </nav>

    <div class="container mt-3">
        <div class="card">
            <h2>Daftar Stok Bahan Ajar</h2>
            <table id="tabelStok">
                <thead>
                    <tr>
                        <th>Cover</th>
                        <th>Kode Lokasi</th>
                        <th>Kode Barang</th>
                        <th>Nama Barang</th>
                        <th>Jenis</th>
                        <th>Edisi</th>
                        <th>Stok</th>
                    </tr>
                </thead>
                <tbody id="stokBody">
                    <!-- Dinamis via JS -->
                </tbody>
            </table>
        </div>

        <div class="card mt-2">
            <h3>Tambah Stok Baru</h3>
            <form id="formTambahStok" class="mt-1">
                <div class="form-group">
                    <label>Kode Lokasi</label>
                    <input type="text" id="inputLokasi" required placeholder="Contoh: 0JKT02">
                </div>
                <div class="form-group">
                    <label>Kode Barang</label>
                    <input type="text" id="inputKode" required placeholder="Contoh: EKMA4216">
                </div>
                <div class="form-group">
                    <label>Nama Barang</label>
                    <input type="text" id="inputNama" required placeholder="Nama Bahan Ajar">
                </div>
                <div class="form-group">
                    <label>Jenis Barang</label>
                    <input type="text" id="inputJenis" required placeholder="Contoh: BMP">
                </div>
                <div class="form-group">
                    <label>Edisi</label>
                    <input type="number" id="inputEdisi" required min="1" placeholder="1">
                </div>
                <div class="form-group">
                    <label>Stok</label>
                    <input type="number" id="inputStok" required min="0" placeholder="100">
                </div>
                <button type="submit" class="btn btn-primary">Tambah ke Tabel</button>
            </form>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/stok.js"></script>
</body>
</html>
